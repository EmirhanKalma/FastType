<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Keyboard Battle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' rx='20' fill='%230a0a0f'/> 
  <text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' 
        fill='%235d5dff' font-family='Arial Black, sans-serif' font-weight='900' font-size='70'>
    F
  </text>
</svg>">
</head>
<body>

<div id="bgContainer"></div>
<span class="Version">Version:1.0.0</span>

<div class="app-wrapper">
    <div id="setup-area" class="hellocard">
        <h1>Сколько игроков?</h1>
        <input type="number" id="player-total" min="1" value="2" class="time">
        <button class="start-btn" onclick="setupMultiplayer()">Далее</button>
    </div>

    <div id="name-area" class="hellocard hidden">
        <h2 id="player-label" style="color: var(--main-color)"></h2>
        <input type="text" id="nickname-input" placeholder="Никнейм" class="time">
        <button class="start-btn" onclick="prepareRound()">Начать</button>
    </div>

    <div id="game-area" class="hidden">
        <div id="timer">15</div>
        <div class="container">
            <div class="words-wrapper"></div>
            <div class="cursor"></div>
        </div>
    </div>

    <div id="result-area" class="result-card">
        <div class="result-main-layout">
            <div class="stats-section" id="results-list"></div>
        </div>
        <div class="result-buttons">
            <button class="start-btn" onclick="location.reload()">Заново</button>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
