<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест только нажатием по клавиатуре</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' rx='20' fill='%230a0a0f'/> 
  <text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' 
        fill='%235d5dff' font-family='Arial Black, sans-serif' font-weight='900' font-size='70'>
    F
  </text>
</svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">
        <div id="timer">15</div>

        <div class="container">
            <div class="words-wrapper"></div>
            <div class="cursor"></div>
        </div>

        <div class="virtual-keyboard">
            <div class="kb-row" id="row-1"></div>
            <div class="kb-row" id="row-2"></div>
            <div class="kb-row" id="row-3"></div>
            <div class="kb-row">
                <button class="key space" id="key-space"></button>
            </div>
        </div>
    </div>
<span class="Version">Version:1.0.0</span>
<div id="result-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Результаты раунда</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="label">WPM</span>
                <span id="final-wpm" class="value">0</span>
            </div>
            <div class="stat-item">
                <span class="label">Точность</span>
                <span id="final-acc" class="value">0%</span>
            </div>
        </div>
        <button class="key" onclick="location.reload()" style="width: 100%; margin-top: 20px;">Повторить</button>
    </div>
</div>

    <script src="main.js"></script>
</body>
</html>
