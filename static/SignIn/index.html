<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Войти</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect width='100' height='100' rx='20' fill='%230a0a0f'/> 
  <text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' 
        fill='%235d5dff' font-family='Arial Black, sans-serif' font-weight='900' font-size='70'>
    F
  </text>
</svg>"
    />
  </head>
  <body>
    <div class="logo-container">
      <h1 class="logo-top">FAST</h1>
      <h1 class="logo-bottom">TYPE</h1>
    </div>

    <form action="">
      <div class="form">
        <div class="logo-container">
          <h1 class="logo-top">FAST</h1>
          <h1 class="logo-bottom">TYPE</h1>
        </div>
        <h1 id="form-title">Sign In</h1>
        <div class="inpt">
          <input placeholder="Введите никнейм" type="text" id="name" />
          <div class="password-wrapper">
            <input
              placeholder="Подтвердите свой пароль"
              type="password"
              id="password"
            />
            <span class="password-toggle" id="toggle-pass2">Show</span>
          </div>
          <p id="incorect2"></p>
        </div>
        <button class="btn" id="btn">Sign In</button>
        <div class="login-footer">
          <p id="incorect"></p>
          <p>Еще нет аккаунта?</p>
          <a id="link" href="../Register/index.html">Зарегистрироваться</a>
        </div>
      </div>
    </form>

    <script src="main.js"></script>
  </body>
</html>
